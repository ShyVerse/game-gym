name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  format-check:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          sudo add-apt-repository -y "deb http://apt.llvm.org/$(lsb_release -cs)/ llvm-toolchain-$(lsb_release -cs) main"
          sudo apt-get update -y
          sudo apt-get install -y clang-format

      - name: Check formatting
        run: |
          find engine/ app/ tests/ -name '*.h' -o -name '*.cpp' \
            | xargs clang-format --dry-run --Werror

  build-and-test:
    name: Build & Test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install meson ninja

      - name: Setup wgpu-native
        run: bash scripts/setup-wgpu.sh

      - name: Setup Dear ImGui
        run: bash scripts/setup-imgui.sh

      - name: Configure
        run: meson setup builddir

      - name: Build
        run: meson compile -C builddir

      - name: Test
        run: meson test -C builddir --print-errorlogs

  codegen-check:
    name: Codegen Freshness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Python dependencies
        run: pip install -r scripts/requirements-codegen.txt

      - name: Check generated files are up to date
        run: python scripts/codegen.py --check

      - name: Coverage Helper Tests
        run: |
          python -m pip install pytest -r scripts/requirements-coverage.txt
          pytest -q tests/test_codegen.py tests/test_coverage_gate.py

  lint:
    name: Clang-Tidy
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install meson ninja llvm@18

      - name: Setup wgpu-native
        run: bash scripts/setup-wgpu.sh

      - name: Setup Dear ImGui
        run: bash scripts/setup-imgui.sh

      - name: Configure
        run: meson setup builddir

      - name: Run clang-tidy
        run: |
          CLANG_TIDY="$(brew --prefix llvm@18)/bin/clang-tidy"
          SDK_PATH="$(xcrun --show-sdk-path)"
          find engine/ -name '*.cpp' -not -path 'engine/script/*' \
            | xargs "$CLANG_TIDY" -p builddir \
              --extra-arg="-isysroot${SDK_PATH}"

  coverage:
    name: Coverage Gate
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install meson ninja

      - name: Create Python virtualenv
        run: python3 -m venv .venv-ci
      - name: Install Python coverage dependencies
        run: |
          . .venv-ci/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -r scripts/requirements-coverage.txt

      - name: Setup wgpu-native
        run: bash scripts/setup-wgpu.sh

      - name: Setup Dear ImGui
        run: bash scripts/setup-imgui.sh

      - name: Setup V8
        run: bash scripts/setup-v8.sh

      - name: Enforce coverage threshold
        run: |
          . .venv-ci/bin/activate
          python scripts/check_coverage.py \
            --builddir builddir-coverage \
            --summary-out builddir-coverage/coverage-summary.json \
            --fail-under-file scripts/coverage-threshold.json
